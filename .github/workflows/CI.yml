name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r METAOS_FINAL_FULL_BUILD/requirements.txt
      - run: pip install pytest
      - run: pytest -q
